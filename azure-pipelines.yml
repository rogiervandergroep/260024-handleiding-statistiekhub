trigger:
  - main  # of master, afhankelijk van je branch

pool:
  vmImage: ubuntu-latest

steps:
  # 1. R installeren
  - script: |
      sudo apt-get update
      sudo apt-get install -y r-base
    displayName: 'Install R'

  # 2. Quarto installeren
  - script: |
      QUARTO_VERSION=1.6.42
      wget -q https://github.com/quarto-dev/quarto-cli/releases/download/v${QUARTO_VERSION}/quarto-${QUARTO_VERSION}-linux-amd64.deb
      sudo dpkg -i quarto-${QUARTO_VERSION}-linux-amd64.deb
    displayName: 'Install Quarto'

  # 3. R packages installeren
  - script: |
      Rscript -e "install.packages(c('rmarkdown', 'knitr'), repos='https://cloud.r-project.org')"
    displayName: 'Install R packages'

  # 4. Book builden
  - script: |
      quarto render
    displayName: 'Render Quarto book'

  # 5. Deployen naar Azure Static Web Apps
  - task: AzureStaticWebApp@0
    displayName: 'Deploy to Azure Static Web Apps'
    inputs:
      app_location: '_book'      # output map van Quarto
      skip_app_build: true       # wij builden zelf
      azure_static_web_apps_api_token: $(DEPLOYMENT_TOKEN)


